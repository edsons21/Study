<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Mapa Mental</title>

<script src="https://cdn.jsdelivr.net/npm/markmap-autoloader"></script>

<style>

html, body, svg {
    width:100%;
    height:100%;
    margin:0;
}

</style>

</head>


<body>

<svg id="mindmap"></svg>


<script>

const arquivo = new URLSearchParams(window.location.search)
.get("arquivo");


fetch(arquivo)
.then(res => res.text())
.then(markdown => {


const { Transformer, Markmap } = window.markmap;


const transformer = new Transformer();

const { root } = transformer.transform(markdown);


Markmap.create(
"#mindmap",
null,
root
);


});


</script>


</body>

</html>
